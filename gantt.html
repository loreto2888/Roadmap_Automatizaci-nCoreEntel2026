<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carta Gantt - Automatizacion Core</title>
    <meta name="description" content="Carta Gantt descargable del roadmap de Automatizacion Core." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="gantt.css?v=20260701-03" />
    <script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
  </head>
  <body>
    <main class="gantt-shell">
      <header class="gantt-header">
        <div>
          <p class="eyebrow">Planificacion visual profesional</p>
          <h1>Carta Gantt del Roadmap</h1>
          <p id="updatedAt" class="meta">Actualizado: --</p>
        </div>
        <div class="actions">
          <div class="zoom-group" aria-label="Controles de zoom">
            <span class="zoom-label">Aumentar / Reducir escala</span>
            <div class="zoom-buttons">
              <button id="zoomOut" class="btn ghost icon-btn" title="Alejar">−</button>
              <button id="zoomIn" class="btn ghost icon-btn" title="Acercar">+</button>
            </div>
          </div>
          <a class="btn ghost" href="index.html">Volver</a>
          <button id="downloadCsv" class="btn" type="button">Descarga Excel</button>
        </div>
      </header>

      <div class="calendar-sidebar-controls calendar-top-strip">
        <button id="calendarPrevMonth" class="btn ghost icon-btn" title="Mes anterior">←</button>
        <div id="ganttCalendarContainer" class="calendar-sidebar-container"></div>
        <button id="calendarNextMonth" class="btn ghost icon-btn" title="Mes siguiente">→</button>
      </div>

      <section class="legend" aria-label="Filtros por etiqueta">
        <button class="legend-item entel" type="button" data-gantt-filter="entel">■ Entel</button>
        <button class="legend-item intellicore" type="button" data-gantt-filter="intellicore">■ Intellicore</button>
        <button class="legend-item gestion" type="button" data-gantt-filter="gestion">■ Gestion</button>
        <button class="legend-item splunk" type="button" data-gantt-filter="splunk">■ Splunk</button>
        <button class="legend-item conjunta" type="button" data-gantt-filter="conjunta">■ Conjunta</button>
        <button class="legend-item legend-completed" type="button" data-gantt-filter="completed">✓ Completada</button>
        <button id="ganttFilterBack" class="btn ghost filter-back" type="button" hidden>Volver</button>
      </section>

      <div class="gantt-container">
        <div class="gantt-sidebar">
          <div class="gantt-head-left">
            <span class="col-task">Tarea</span>
            <span class="col-pct">%</span>
            <span class="col-start">Inicio</span>
            <span class="col-end">Fin</span>
            <span class="col-dep">Dependencia</span>
            <span class="col-status">Estado</span>
            <span class="col-cal">Calendario</span>
          </div>
          <div id="ganttRowsLeft" class="gantt-rows-left"></div>
        </div>

        <div class="gantt-viewport">
          <div class="gantt-timeline-header" id="ganttTimelineHeader"></div>
          <svg id="ganttDependencies" class="gantt-dependencies"></svg>
          <div class="gantt-rows-container" id="ganttRowsContainer"></div>
          <div class="gantt-horizontal-scroll" id="ganttHorizontalScroll">
            <div id="ganttHorizontalSpacer"></div>
          </div>
        </div>
      </div>

      <div class="gantt-legend-detail">
        <p><small>💡 Arrastra el scroll para navegar • Usa los botones +/− para cambiar escala</small></p>
      </div>
    </main>

    <script src="gantt.js?v=20260701-03"></script>
  </body>
</html>
