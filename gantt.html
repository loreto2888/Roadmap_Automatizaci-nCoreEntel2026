<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carta Gantt - Automatizacion Core</title>
    <meta name="description" content="Carta Gantt descargable del roadmap de Automatizacion Core." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="gantt.css" />
  </head>
  <body>
    <main class="gantt-shell">
      <header class="gantt-header">
        <div>
          <p class="eyebrow">Planificacion visual profesional</p>
          <h1>Carta Gantt del Roadmap</h1>
          <p id="updatedAt" class="meta">Actualizado: --</p>
          <div class="meta-strip">
            <span>Fecha actual: <strong id="ganttCurrentDate">--/--/----</strong></span>
            <span>Contador: <strong id="ganttDayCounter">D0/0</strong></span>
          </div>
        </div>
        <div class="actions">
          <button id="zoomOut" class="btn ghost icon-btn" title="Alejar">−</button>
          <button id="zoomIn" class="btn ghost icon-btn" title="Acercar">+</button>
          <a class="btn ghost" href="index.html">Volver</a>
          <button id="downloadCsv" class="btn" type="button">Descargar CSV</button>
        </div>
      </header>

      <section class="legend" aria-label="Leyenda por etiqueta">
        <span class="legend-item entel">■ Entel</span>
        <span class="legend-item intellicore">■ Intellicore</span>
        <span class="legend-item gestion">■ Gestion</span>
        <span class="legend-item splunk">■ Splunk</span>
        <span class="legend-item conjunta">■ Conjunta</span>
        <span class="legend-item legend-completed">✓ Completada</span>
      </section>

      <div class="calendar-sidebar-controls calendar-top-strip">
        <button id="calendarPrevMonth" class="btn ghost icon-btn" title="Mes anterior">←</button>
        <div id="ganttCalendarContainer" class="calendar-sidebar-container"></div>
        <button id="calendarNextMonth" class="btn ghost icon-btn" title="Mes siguiente">→</button>
      </div>

      <div class="gantt-container">
        <div class="gantt-sidebar">
          <div class="gantt-head-left">
            <span class="col-task">Tarea</span>
            <span class="col-pct">%</span>
            <span class="col-start">Inicio</span>
            <span class="col-end">Fin</span>
            <span class="col-dep">Dep.</span>
            <span class="col-cal">Cal</span>
            <span class="col-status">Estado</span>
          </div>
          <div id="ganttRowsLeft" class="gantt-rows-left"></div>
        </div>

        <div class="gantt-viewport">
          <div class="gantt-timeline-header" id="ganttTimelineHeader"></div>
          <svg id="ganttDependencies" class="gantt-dependencies"></svg>
          <div class="gantt-rows-container" id="ganttRowsContainer"></div>
        </div>
      </div>

      <div class="gantt-legend-detail">
        <p><small>💡 Arrastra el scroll para navegar • Usa los botones +/− para cambiar escala</small></p>
      </div>
    </main>

    <script src="gantt.js"></script>
  </body>
</html>
